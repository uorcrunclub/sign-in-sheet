<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UORC Raffle App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/cpsmith516/UORC/main/uorc_app_icon_blue.png?v=1">
  <link rel="apple-touch-icon" sizes="167x167" href="https://raw.githubusercontent.com/cpsmith516/UORC/main/uorc_app_icon_blue.png?v=1">
  <link rel="apple-touch-icon" sizes="152x152" href="https://raw.githubusercontent.com/cpsmith516/UORC/main/uorc_app_icon_blue.png?v=1">
  <link rel="apple-touch-icon" sizes="120x120" href="https://raw.githubusercontent.com/cpsmith516/UORC/main/uorc_app_icon_blue.png?v=1">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/cpsmith516/UORC/main/uorc_app_icon_blue.png?v=1">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #005395;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }
    .logo {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      display: block;
      margin: 0 auto 18px auto;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
      line-height: 1.15;
    }
    p {
      margin: 0 0 18px 0;
      color: #444444;
      font-size: 16px;
      line-height: 1.45;
    }
    .status {
      margin: 0 0 18px 0;
      font-size: 15px;
      color: #005395;
      font-weight: 600;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 18px;
      border-radius: 14px;
      background: #005395;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      border: 0;
    }
    .small {
      margin-top: 14px;
      color: #666666;
      font-size: 13px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img
        class="logo"
        src="https://raw.githubusercontent.com/cpsmith516/UORC/main/uorc_app_icon_blue.png?v=1"
        alt="UORC Raffle Icon"
      >
      <h1>UORC Raffle</h1>
      <a
        class="btn"
        id="launchBtn"
        href="https://script.google.com/macros/s/AKfycbxZAJdavH1MeigpmSMskTE7LGvYr2E8VTodtHJAEZ9-7o3KP4k6j8vK4HfWSofbPdFspg/exec"
      >
        Open UORC Raffle
      </a>
    </div>
  </div>
</body>
</html>
