<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover">
  <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="167x167" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="152x152" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="120x120" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <meta name="apple-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="UORC Raffle">
  <link rel="stylesheet" href="/sign-in-sheet/styles.css">
  <title>UORC Raffle</title>
</head>
<body>
  <main class="page-shell">
    <section class="page-header">
      <h1>UORC Raffle</h1>
    </section>

    <form class="card" id="authCard">
      <h2>Admin Access</h2>
      <p class="muted">Enter the raffle admin key to continue.</p>
      <label for="adminKeyInput">Admin key</label>
      <input id="adminKeyInput" type="password" autocomplete="current-password" inputmode="text">
      <div class="button-row">
        <button id="unlockBtn" class="primary-btn" type="submit">Unlock Raffle</button>
      </div>
      <div id="authStatus" class="status-text"></div>
    </form>

    <section id="raffleApp" hidden>
      <section class="card" id="drawCard">
        <h2>Draw Winners</h2>
        <label for="winnerCount">Number of winners to draw</label>
        <input id="winnerCount" type="number" min="1" step="1" placeholder="Enter number of winners">
        <div class="button-row">
          <button id="drawBtn" class="primary-btn" type="button">Draw winner(s)</button>
        </div>
        <p class="meta-line">Last draw: <span id="lastDraw"></span></p>
      </section>

      <section class="card" id="winnersCard" hidden>
        <h2>Current active winner(s)</h2>
        <div id="winnerList" class="winner-list"></div>
        <div class="button-row stacked">
          <button id="redrawSelectedBtn" class="secondary-btn" type="button" disabled>Redraw selected</button>
        </div>
      </section>

      <section class="card" id="redrawBlock" hidden>
        <h2>Additional Winners</h2>
        <p class="muted">Use this only when you intentionally want more active winners added.</p>
        <label class="checkbox-row">
          <input id="allowRedraw" type="checkbox">
          <span>I understand this will append more active winners to the log.</span>
        </label>
        <div class="button-row">
          <button id="drawAdditionalBtn" class="danger-btn" type="button" disabled>Draw Additional Participants</button>
        </div>
      </section>

      <section class="card">
          <iframe name="raffleTransportFrame" id="raffleTransportFrame" hidden></iframe>
        <div class="button-row">
          <button id="forgetKeyBtn" class="secondary-btn" type="button">Logout</button>
        </div>
      </section>
    </section>
  </main>



  <form id="raffleTransportForm"
        action="https://script.google.com/macros/s/AKfycbzoSr6z6FLDflWNBxVFStb65qJzc2EspLHPYj0ZG8LmKxZBR1V7MEu96vgxtwdc2NOfzg/exec?route=raffle"
        method="post"
        target="raffleTransportFrame"
        hidden>
    <input type="hidden" name="action" id="transportAction">
    <input type="hidden" name="adminKey" id="transportAdminKey">
    <input type="hidden" name="winnerCount" id="transportWinnerCount">
    <div id="selectedKeysContainer"></div>
  </form>

  <script>
  const ADMIN_KEY_STORAGE = 'uorcRaffleAdminKey';

  const authCard = document.getElementById('authCard');
  const raffleApp = document.getElementById('raffleApp');
  const adminKeyInput = document.getElementById('adminKeyInput');
  const unlockBtn = document.getElementById('unlockBtn');
  const authStatus = document.getElementById('authStatus');

  const winnerCountInput = document.getElementById('winnerCount');
  const drawBtn = document.getElementById('drawBtn');
  const drawAdditionalBtn = document.getElementById('drawAdditionalBtn');
  const redrawSelectedBtn = document.getElementById('redrawSelectedBtn');
  const allowRedraw = document.getElementById('allowRedraw');
  const forgetKeyBtn = document.getElementById('forgetKeyBtn');

  const winnersCard = document.getElementById('winnersCard');
  const redrawBlock = document.getElementById('redrawBlock');
  const winnerList = document.getElementById('winnerList');
  const lastDraw = document.getElementById('lastDraw');
  const globalStatus = null;

  const raffleTransportForm = document.getElementById('raffleTransportForm');
  const transportAction = document.getElementById('transportAction');
  const transportAdminKey = document.getElementById('transportAdminKey');
  const transportWinnerCount = document.getElementById('transportWinnerCount');
  const selectedKeysContainer = document.getElementById('selectedKeysContainer');

  let pendingRequest = null;
  let requestTimeout = null;

  function getAdminKey() {
    return sessionStorage.getItem(ADMIN_KEY_STORAGE) || '';
  }

  function setAdminKey(value) {
    sessionStorage.setItem(ADMIN_KEY_STORAGE, value);
  }

  function clearAdminKey() {
    sessionStorage.removeItem(ADMIN_KEY_STORAGE);
  }

  let activeToast = null;
  let activeToastTimer = null;
  
  function removeToast(immediate = false) {
    if (!activeToast) return;
  
    const toast = activeToast;
    activeToast = null;
  
    const backdrop = document.getElementById('toastBackdrop');
    if (backdrop) backdrop.classList.remove('show');
  
    if (activeToastTimer) {
      clearTimeout(activeToastTimer);
      activeToastTimer = null;
    }
  
    if (immediate) {
      toast.remove();
      return;
    }
  
    toast.classList.remove('show');
    toast.classList.add('hide');
  
    window.setTimeout(() => {
      toast.remove();
    }, 220);
  }

  function showToast(message, type = 'info', options = {}) {
    const {
      title = '',
      duration = 7000,
      dismissible = true,
      persistent = false
    } = options;
  
    const host = document.getElementById('toastHost');
    const backdrop = document.getElementById('toastBackdrop');
    if (!host) return;
  
    removeToast(true);
  
    host.classList.remove('top', 'center');
  
    if (type === 'error') {
      host.classList.add('center');
      if (backdrop) backdrop.classList.add('show');
    } else {
      host.classList.add('top');
      if (backdrop) backdrop.classList.remove('show');
    }
  
    const toast = document.createElement('div');
    toast.className = `toast-card ${type}`;
  
    const resolvedTitle =
      title ||
      (type === 'error' ? 'Error' :
       type === 'success' ? '' :
       type === 'loading' ? '' :
       'Notice');
  
    toast.innerHTML = `
      <span class="toast-title">${escapeHtml(resolvedTitle)}</span>
      <div class="toast-message">${escapeHtml(message || '')}</div>
      ${dismissible ? '<button class="toast-close" type="button">Dismiss</button>' : ''}
    `;
  
    if (dismissible) {
      toast.querySelector('.toast-close').addEventListener('click', () => removeToast());
    }
  
    host.appendChild(toast);
  
    if (dismissible) {
      enableToastSwipe(toast);
    }
  
    activeToast = toast;
  
    requestAnimationFrame(() => {
      toast.classList.add('show');
    });
  
    if (!persistent && duration > 0) {
      activeToastTimer = window.setTimeout(() => {
        removeToast();
      }, duration);
    }
  }

  function setStatus(el, message, type = '') {
    if (el) {
      el.textContent = '';
      el.className = 'status-text';
    }
  
    if (!message) {
      removeToast();
      return;
    }
  
    const toastType =
      type === 'error' ? 'error' :
      type === 'success' ? 'success' :
      type === 'loading' ? 'loading' :
      'info';
  
    const toastOptions =
      toastType === 'error'
        ? { persistent: true, dismissible: true, duration: 0 }
        : toastType === 'loading'
        ? { persistent: true, dismissible: false, duration: 0 }
        : { persistent: false, dismissible: true, duration: 6000 };
  
    showToast(message, toastType, toastOptions);
  }
  
  function enableToastSwipe(toast) {
    let startX = 0;
    let currentX = 0;
    let dragging = false;
  
    const onPointerDown = (e) => {
      if (e.pointerType === 'mouse') return;
      dragging = true;
      startX = e.clientX;
      currentX = 0;
      toast.style.transition = 'none';
      toast.setPointerCapture?.(e.pointerId);
    };
  
    const onPointerMove = (e) => {
      if (!dragging) return;
      currentX = e.clientX - startX;
      toast.style.transform = `translateX(${currentX}px) scale(1)`;
      toast.style.opacity = String(Math.max(0.35, 1 - Math.abs(currentX) / 220));
    };
  
    const onPointerUp = () => {
      if (!dragging) return;
      dragging = false;
  
      const shouldDismiss = Math.abs(currentX) > 90;
  
      toast.style.transition = '';
  
      if (shouldDismiss) {
        removeToast();
      } else {
        toast.style.transform = '';
        toast.style.opacity = '';
      }
    };
  
    toast.addEventListener('pointerdown', onPointerDown);
    toast.addEventListener('pointermove', onPointerMove);
    toast.addEventListener('pointerup', onPointerUp);
    toast.addEventListener('pointercancel', onPointerUp);
  }
    
  function applyLastDrawText(value) {
    lastDraw.textContent = value || 'Not yet run today';
  }

  function escapeHtml(value) {
    return String(value || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function getSelectedWinnerKeys() {
    return Array.from(document.querySelectorAll('.winner-check:checked'))
      .map(cb => cb.value)
      .filter(Boolean);
  }

  function updateSelectionButtons() {
    const hasSelection = getSelectedWinnerKeys().length > 0;
    redrawSelectedBtn.disabled = !hasSelection;
  }

  function renderWinners(winners) {
    winnerList.innerHTML = '';

    if (!winners || !winners.length) {
      winnersCard.hidden = true;
      updateSelectionButtons();
      return;
    }

    winners.forEach((winner, index) => {
      const row = document.createElement('label');
      row.className = 'winner-pill';

      row.innerHTML = `
        <input class="winner-check" type="checkbox" value="${escapeHtml(winner.key || '')}">
        <span class="winner-pill-indicator"></span>
        <span class="winner-pill-text"><strong>${index + 1}.</strong> ${escapeHtml(winner.displayName || '')}</span>
      `;

      row.querySelector('.winner-check').addEventListener('change', updateSelectionButtons);
      winnerList.appendChild(row);
    });

    winnersCard.hidden = false;
    updateSelectionButtons();
  }

  function normalizeResponse(res) {
    if (!res || typeof res !== 'object') {
      return {
        ok: false,
        message: 'Invalid server response.'
      };
    }

    if ('ok' in res) {
      return res;
    }

    if ('success' in res) {
      return {
        ok: !!res.success,
        message: res.message || '',
        details: res.details || '',
        winners: res.winners || []
      };
    }

    return {
      ok: false,
      message: 'Unexpected response format.'
    };
  }

  function submitRaffleRequest(action, options = {}) {
    return new Promise((resolve, reject) => {
      if (pendingRequest) {
        reject(new Error('Another raffle request is already in progress.'));
        return;
      }

      pendingRequest = { resolve, reject };

      transportAction.value = action;
      transportAdminKey.value = getAdminKey();
      transportWinnerCount.value = options.winnerCount || '';

      selectedKeysContainer.innerHTML = '';
      (options.selectedWinnerKeys || []).forEach((key) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'selectedWinnerKeys';
        input.value = key;
        selectedKeysContainer.appendChild(input);
      });

      raffleTransportForm.submit();

      requestTimeout = window.setTimeout(() => {
        if (pendingRequest) {
          pendingRequest = null;
          reject(new Error('The raffle request timed out.'));
        }
      }, 15000);
    });
  }

  window.addEventListener('message', (event) => {
  const origin = event.origin || '';

  const allowed =
    origin === 'https://script.google.com' ||
    origin.endsWith('.googleusercontent.com');

  if (!allowed) {
    return;
  }

  console.log('postMessage received origin:', event.origin);
  console.log('postMessage payload:', event.data);
  console.log('postMessage payload JSON:', JSON.stringify(event.data, null, 2));

  if (!pendingRequest) {
    return;
  }

  if (requestTimeout) {
    clearTimeout(requestTimeout);
    requestTimeout = null;
  }

  const payload = normalizeResponse(event.data);
  const { resolve } = pendingRequest;
  pendingRequest = null;
  resolve(payload);
});
    
  async function unlockRaffle() {
    const inputValue = adminKeyInput.value.trim();

    if (!inputValue) {
      setStatus(authStatus, 'Enter the admin key.', 'error');
      return;
    }

    unlockBtn.disabled = true;
    setStatus(authStatus, 'Checking key...', '');

    try {
      setAdminKey(inputValue);
      const res = await submitRaffleRequest('authCheck');

      if (!res.ok) {
        clearAdminKey();
        setStatus(authStatus, res.message || 'Invalid admin key.', 'error');
        unlockBtn.disabled = false;
        return;
      }

      authCard.hidden = true;
      raffleApp.hidden = false;
      adminKeyInput.value = '';
      setStatus(authStatus, '');
      unlockBtn.disabled = false;

      await loadState();
    } catch (err) {
      clearAdminKey();
      setStatus(authStatus, err.message || 'Unlock failed.', 'error');
      unlockBtn.disabled = false;
    }
  }

async function loadState() {
  setStatus(globalStatus, 'Loading raffle state...', 'loading');

  try {
    const res = await submitRaffleRequest('getState');

    if (!res.ok) {
      renderWinners([]);
      redrawBlock.hidden = true;
      drawBtn.hidden = false;
      applyLastDrawText('');
      setStatus(globalStatus, res.message || 'Failed to load state.', 'error');
      return;
    }

    renderWinners(res.winners || []);
    redrawBlock.hidden = !res.drawnToday;
    drawBtn.hidden = !!res.drawnToday;
    applyLastDrawText(res.lastDrawText);
    setStatus(globalStatus, '');
  } catch (err) {
    setStatus(globalStatus, err.message || 'Failed to load state.', 'error');
  }
}

 async function runDraw(isAdditional) {
  const winnerCount = parseInt(winnerCountInput.value, 10);

  if (!winnerCount || winnerCount < 1) {
    setStatus(globalStatus, 'Enter a valid number of winners.', 'error');
    return;
  }

  if (isAdditional && !allowRedraw.checked) {
    setStatus(globalStatus, 'Check the confirmation box before running an additional draw.', 'error');
    return;
  }

  const action = isAdditional ? 'drawAdditional' : 'drawWinners';
  const button = isAdditional ? drawAdditionalBtn : drawBtn;

  button.disabled = true;
  setStatus(globalStatus, isAdditional ? 'Running additional draw...' : 'Running raffle draw...', 'loading');

  try {
    const res = await submitRaffleRequest(action, { winnerCount });

    if (!res.ok) {
      setStatus(
        globalStatus,
        (res.message || 'Request failed.') + (res.details ? '\n' + res.details : ''),
        'error'
      );
      button.disabled = false;
      return;
    }

    applyLastDrawText(res.lastDrawText);

    if (Array.isArray(res.winners)) {
      renderWinners(res.winners);
      redrawBlock.hidden = false;
      drawBtn.hidden = true;
    }

    setStatus(
      globalStatus,
      (res.message || 'Success.') + (res.details ? '\n' + res.details : ''),
      'success'
    );

    button.disabled = false;

    await loadState();
  } catch (err) {
    setStatus(globalStatus, err.message || 'Draw failed.', 'error');
    button.disabled = false;
  }
}

  async function redrawSelected() {
    const selectedWinnerKeys = getSelectedWinnerKeys();

    if (!selectedWinnerKeys.length) {
      setStatus(globalStatus, 'Select at least one winner to redraw.', 'error');
      return;
    }

    redrawSelectedBtn.disabled = true;
    setStatus(globalStatus, 'Redrawing selected winner(s)...', 'loading');

    try {
      const res = await submitRaffleRequest('redrawSelected', { selectedWinnerKeys });

      if (!res.ok) {
        setStatus(
          globalStatus,
          (res.message || 'Redraw failed.') + (res.details ? '\n' + res.details : ''),
          'error'
        );
        await loadState();
        return;
      }

      setStatus(
        globalStatus,
        (res.message || 'Selective redraw complete.') + (res.details ? '\n' + res.details : ''),
        'success'
      );

      await loadState();
    } catch (err) {
      setStatus(globalStatus, err.message || 'Redraw failed.', 'error');
    } finally {
      redrawSelectedBtn.disabled = false;
    }
  }

  async function markSelected(statusAction) {
    const selectedWinnerKeys = getSelectedWinnerKeys();

    if (!selectedWinnerKeys.length) {
      setStatus(globalStatus, 'Select at least one winner.', 'error');
      return;
    }

    const statusText =
      statusAction === 'markSelectedWinner'
        ? 'Marking selected as Winner...'
        : 'Marking selected as Removed...';

    setStatus(globalStatus, statusText, '');

    try {
      const res = await submitRaffleRequest(statusAction, { selectedWinnerKeys });

      if (!res.ok) {
        setStatus(
          globalStatus,
          (res.message || 'Status update failed.') + (res.details ? '\n' + res.details : ''),
          'error'
        );
        await loadState();
        return;
      }

      setStatus(
        globalStatus,
        (res.message || 'Status updated.') + (res.details ? '\n' + res.details : ''),
        'success'
      );

      await loadState();
    } catch (err) {
      setStatus(globalStatus, err.message || 'Status update failed.', 'error');
    }
  }

  function forgetKey() {
    clearAdminKey();
    authCard.hidden = false;
    raffleApp.hidden = true;
    adminKeyInput.value = '';
    setStatus(authStatus, 'Logged Out', 'status');
    setStatus(globalStatus, '');
    winnerList.innerHTML = '';
    winnersCard.hidden = true;
    redrawBlock.hidden = true;
    drawBtn.hidden = false;
    unlockBtn.disabled = false;
  }

  // Button wiring
  authCard.addEventListener('submit', (e) => {
    e.preventDefault();
    unlockRaffle();
  });

  drawBtn.addEventListener('click', () => runDraw(false));
  drawAdditionalBtn.addEventListener('click', () => runDraw(true));
  redrawSelectedBtn.addEventListener('click', redrawSelected);

  allowRedraw.addEventListener('change', () => {
    drawAdditionalBtn.disabled = !allowRedraw.checked;
  });

  forgetKeyBtn.addEventListener('click', forgetKey);

  window.addEventListener('DOMContentLoaded', async () => {
    drawAdditionalBtn.disabled = !allowRedraw.checked;

    if (getAdminKey()) {
      authCard.hidden = true;
      raffleApp.hidden = false;
      await loadState();
    } else {
      authCard.hidden = false;
      raffleApp.hidden = true;
    }
  });
</script>

<div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>  
<div id="toastBackdrop" class="toast-backdrop"></div>

</body>
</html>
