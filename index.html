<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UORC Run Club</title>

  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      overflow: hidden;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #000000;
      }
    }

    .logo {
      width: 80vw;
      max-width: 600px;
      height: auto;
      opacity: 0;
      transform: scale(0.96);
      animation: fadeIn 1.2s ease-out forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <img 
    class="logo"
    src="https://raw.githubusercontent.com/uorcrunclub/webapp/main/assets/uorc_app_icon_black.png" 
    alt="UORC Run Club Logo"
  >
</body>
</html>
