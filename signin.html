<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UORC Sign-In</title>

  <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="167x167" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="152x152" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="120x120" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">

  <meta name="apple-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="UORC Sign-In">

  <link rel="stylesheet" href="styles.css">
  
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div class="eyebrow">UORC Check-In</div>
      <h1>Participant Sign-In</h1>
      <div class="subtext">Complete the fields below to finish check-in.</div>
    </div>

    <div class="content" id="formContainer">
      <div class="waiver-status" id="waiverStatus">Checking waiver status...</div>

      <form id="form" method="POST" target="submitFrame" action="https://script.google.com/macros/s/AKfycbzoSr6z6FLDflWNBxVFStb65qJzc2EspLHPYj0ZG8LmKxZBR1V7MEu96vgxtwdc2NOfzg/exec" novalidate>
        
        <div class="field-row">
          <div class="field-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" required autocomplete="given-name">
          </div>

          <div class="field-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" required autocomplete="family-name">
          </div>
        </div>

        <div class="field-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" autocomplete="email" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$">
          <div class="helper">Optional.</div>
        </div>

        <div class="field-group">
          <label for="phone">Phone Number</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel">
          <div class="helper">Optional.</div>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="emergencyName">Emergency Contact Name</label>
            <input type="text" id="emergencyName" name="emergencyName" required>
          </div>

          <div class="field-group">
            <label for="emergencyPhone">Emergency Contact Phone</label>
            <input id="emergencyPhone" name="emergencyPhone" type="tel" required autocomplete="tel">
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="primary" id="submitBtn">Check In</button>
          <button type="button" class="secondary" id="backBtn">Back to Waiver</button>
        </div>

        <div id="message" class="message"></div>
        
        <input type="hidden" id="waiverAcceptance" name="waiverAcceptance">
        <input type="hidden" id="signature" name="signature">
        <input type="hidden" id="waiverSignedAt" name="waiverSignedAt">
        
      </form>
    </div>

    <div id="lockedScreen" class="locked-screen">
      <h2>Waiver Required</h2>
      <p>You must complete the waiver before signing in.</p>
      <button id="goToWaiver" class="primary">Go to Waiver</button>
    </div>

    <div id="successScreen" class="success-screen">
      <h2>You're checked in</h2>
      <p>Have a great run.</p>
      <button id="nextBtn" class="primary">Check In Another Participant</button>
    </div>
  </div>

  <div class="footer-note">UORC participant sign-in | v1.0</div>
</div>
  

<iframe name="submitFrame" id="submitFrame" style="display:none;"></iframe>

<script>
  const form = document.getElementById('form');
  const formContainer = document.getElementById('formContainer');
  const successScreen = document.getElementById('successScreen');
  const lockedScreen = document.getElementById('lockedScreen');
  const waiverStatus = document.getElementById('waiverStatus');
  const message = document.getElementById('message');

  const firstNameInput = document.getElementById('firstName');
  const lastNameInput = document.getElementById('lastName');
  const emailInput = document.getElementById('email');
  const phoneInput = document.getElementById('phone');
  const emergencyNameInput = document.getElementById('emergencyName');
  const emergencyPhoneInput = document.getElementById('emergencyPhone');
  const submitBtn = document.getElementById('submitBtn');

  const waiverAcceptanceInput = document.getElementById('waiverAcceptance');
  const signatureInput = document.getElementById('signature');
  const waiverSignedAtInput = document.getElementById('waiverSignedAt');

  function getWaiverData() {
    try {
      return JSON.parse(sessionStorage.getItem('uorcWaiverData'));
    } catch {
      return null;
    }
  }

  function showMessage(text, type) {
    message.textContent = text;
    message.className = 'message ' + type;
  }

  function clearMessage() {
    message.textContent = '';
    message.className = 'message';
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function digitsOnly(value) {
    return String(value || '').replace(/\D/g, '');
  }

  function formatPhoneInput(value) {
    const digits = digitsOnly(value).slice(0, 10);

    if (digits.length === 0) {
      return '';
    }

    if (digits.length < 4) {
      return `(${digits}`;
    }

    if (digits.length < 7) {
      return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
    }

    return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
  }

  function attachPhoneFormatter(input) {
    input.addEventListener('input', (e) => {
      e.target.value = formatPhoneInput(e.target.value);
    });

    input.addEventListener('blur', (e) => {
      e.target.value = formatPhoneInput(e.target.value);
    });
  }

  function validateAccess() {
    const data = getWaiverData();

    if (!data || data.waiverAccepted !== 'Yes' || !data.signature || !data.waiverFlowToken) {
      formContainer.classList.add('hidden');
      lockedScreen.classList.add('show');
      return null;
    }

    waiverStatus.innerHTML = `Waiver signed by <strong>${escapeHtml(data.signature)}</strong>`;

    if (data.firstName) {
      firstNameInput.value = data.firstName;
    }

    if (data.lastName) {
      lastNameInput.value = data.lastName;
    }

    return data;
  }

  function validateForm() {
    const firstName = firstNameInput.value.trim();
    const lastName = lastNameInput.value.trim();
    const email = emailInput.value.trim();
    const phone = phoneInput.value.trim();
    const emergencyName = emergencyNameInput.value.trim();
    const emergencyPhone = emergencyPhoneInput.value.trim();

    if (!firstName) {
      showMessage('Please enter your first name.', 'error');
      firstNameInput.focus();
      return false;
    }

    if (!lastName) {
      showMessage('Please enter your last name.', 'error');
      lastNameInput.focus();
      return false;
    }

    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showMessage('Please enter a valid email address.', 'error');
      emailInput.focus();
      return false;
    }

    if (phone) {
      const phoneDigits = digitsOnly(phone);
      if (phoneDigits.length !== 10) {
        showMessage('Please enter a valid 10-digit phone number.', 'error');
        phoneInput.focus();
        return false;
      }
      phoneInput.value = formatPhoneInput(phone);
    }

    if (!emergencyName) {
      showMessage('Please enter an emergency contact name.', 'error');
      emergencyNameInput.focus();
      return false;
    }

    const emergencyPhoneDigits = digitsOnly(emergencyPhone);
    if (emergencyPhoneDigits.length !== 10) {
      showMessage('Please enter a valid 10-digit emergency contact phone number.', 'error');
      emergencyPhoneInput.focus();
      return false;
    }

    emergencyPhoneInput.value = formatPhoneInput(emergencyPhone);

    return true;
  }

  document.getElementById('goToWaiver').onclick = () => {
    window.location.href = 'waiver.html';
  };

  document.getElementById('backBtn').onclick = () => {
    window.location.href = 'waiver.html';
  };

  document.getElementById('nextBtn').onclick = () => {
    sessionStorage.removeItem('uorcWaiverData');
    form.reset();
    successScreen.classList.remove('show');
    window.location.href = 'waiver.html';
  };

  form.addEventListener('submit', (e) => {
  e.preventDefault();
  clearMessage();

  const waiver = getWaiverData();
  if (!waiver) {
    showMessage('Waiver information is missing. Please complete the waiver again.', 'error');
    return;
  }

  if (!validateForm()) {
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting...';

  phoneInput.value = digitsOnly(phoneInput.value.trim());
  emergencyPhoneInput.value = digitsOnly(emergencyPhoneInput.value.trim());
  waiverAcceptanceInput.value = waiver.waiverAccepted;
  signatureInput.value = waiver.signature;
  waiverSignedAtInput.value = waiver.signedAt || '';

  form.submit();
  });
  
  attachPhoneFormatter(phoneInput);
  attachPhoneFormatter(emergencyPhoneInput);

  validateAccess();

  window.addEventListener('message', (event) => {
  if (event.origin !== 'https://script.googleusercontent.com' &&
      event.origin !== 'https://script.google.com') {
    return;
  }

  const data = event.data;
  if (!data || typeof data !== 'object') {
    return;
  }

  if (data.success === true) {
    formContainer.classList.add('hidden');
    successScreen.classList.add('show');
    return;
  }

  if (data.success === false) {
    showMessage(data.message || 'Submission failed.', 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Check In';
  }
  });
</script>
</body>
</html>
