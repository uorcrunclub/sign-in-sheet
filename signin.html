<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UORC Sign-In</title>

  <!-- Apple Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="167x167" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="152x152" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="120x120" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="UORC Sign-In">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: #111;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #2a2a2a;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0d0d0d;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .primary {
      background: #0078d4;
      color: white;
    }

    .secondary {
      background: #2b2b2b;
      color: white;
    }

    .locked {
      opacity: 0.35;
      pointer-events: none;
    }

    .hidden {
      display: none;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
    }

    .success {
      text-align: center;
      padding: 40px 20px;
    }

    .success h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="card" id="formContainer">
    <h1>Participant Sign-In</h1>

    <div id="waiverStatus" class="message"></div>

    <form id="form">
      <input id="firstName" placeholder="First Name" required>
      <input id="lastName" placeholder="Last Name" required>
      <input id="email" placeholder="Email (optional)">
      <input id="emergencyName" placeholder="Emergency Contact Name" required>
      <input id="emergencyPhone" placeholder="Emergency Contact Phone" required>

      <button type="submit" class="primary" id="submitBtn">Check In</button>
      <button type="button" class="secondary" id="backBtn">Back to Waiver</button>

      <div id="message" class="message"></div>
    </form>
  </div>

  <!-- LOCKED SCREEN -->
  <div id="lockedScreen" class="hidden success">
    <h2>Waiver Required</h2>
    <p>You must complete the waiver before signing in.</p>
    <button id="goToWaiver" class="primary">Go to Waiver</button>
  </div>

  <!-- SUCCESS SCREEN -->
  <div id="successScreen" class="hidden success">
    <h2>You're checked in</h2>
    <p>Have a great run.</p>

    <button id="nextBtn" class="primary">
      Check In Another Participant
    </button>
  </div>

</div>

<script>
const form = document.getElementById('form');
const formContainer = document.getElementById('formContainer');
const successScreen = document.getElementById('successScreen');
const lockedScreen = document.getElementById('lockedScreen');
const waiverStatus = document.getElementById('waiverStatus');
const message = document.getElementById('message');

const APPS_SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

function getWaiverData() {
  try {
    return JSON.parse(sessionStorage.getItem('uorcWaiverData'));
  } catch {
    return null;
  }
}

function validateAccess() {
  const data = getWaiverData();

  if (!data || data.waiverAccepted !== 'Yes' || !data.signature || !data.waiverFlowToken) {
    formContainer.classList.add('hidden');
    lockedScreen.classList.remove('hidden');
    return null;
  }

  waiverStatus.innerHTML = `Waiver signed by <strong>${data.signature}</strong>`;
  return data;
}

document.getElementById('goToWaiver').onclick = () => {
  window.location.href = 'waiver.html';
};

document.getElementById('backBtn').onclick = () => {
  window.location.href = 'waiver.html';
};

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const waiver = getWaiverData();
  if (!waiver) return;

  const payload = new URLSearchParams();
  payload.append('firstName', firstName.value.trim());
  payload.append('lastName', lastName.value.trim());
  payload.append('email', email.value.trim());
  payload.append('emergencyName', emergencyName.value.trim());
  payload.append('emergencyPhone', emergencyPhone.value.trim());
  payload.append('waiverAcceptance', waiver.waiverAccepted);
  payload.append('signature', waiver.signature);

  try {
    if (APPS_SCRIPT_URL.includes('PASTE')) {
      console.log('TEST MODE:', Object.fromEntries(payload.entries()));
    } else {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: payload
      });
    }

    formContainer.classList.add('hidden');
    successScreen.classList.remove('hidden');

  } catch (err) {
    message.textContent = 'Submission failed. Try again.';
  }
});

document.getElementById('nextBtn').onclick = () => {
  // 🔥 CLEAR EVERYTHING FOR NEXT USER
  sessionStorage.removeItem('uorcWaiverData');

  // reset UI
  successScreen.classList.add('hidden');
  formContainer.classList.remove('hidden');
  form.reset();

  // force full restart of flow
  window.location.href = 'waiver.html';
};

// INIT
validateAccess();
</script>

</body>
</html>
