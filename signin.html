<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UORC Sign-In</title>

  <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="167x167" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="152x152" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="120x120" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">

  <meta name="apple-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="UORC Sign-In">

  <link rel="stylesheet" href="styles.css">
  
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div class="eyebrow">UORC Check-In</div>
      <h1>Participant Sign-In</h1>
      <div class="subtext">Complete the fields below to finish check-in.</div>
    </div>

    <div class="content" id="formContainer">
      <div class="waiver-status" id="waiverStatus">Checking waiver status...</div>

      <form id="form" novalidate>
        <div class="field-row">
          <div class="field-group">
            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" required autocomplete="given-name">
          </div>

          <div class="field-group">
            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" required autocomplete="family-name">
          </div>
        </div>

        <div class="field-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" autocomplete="email">
          <div class="helper">Optional.</div>
        </div>

        <div class="field-group">
          <label for="phone">Phone Number</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel">
          <div class="helper">Optional.</div>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="emergencyName">Emergency Contact Name</label>
            <input id="emergencyName" name="emergencyName" required>
          </div>

          <div class="field-group">
            <label for="emergencyPhone">Emergency Contact Phone</label>
            <input id="emergencyPhone" name="emergencyPhone" type="tel" required autocomplete="tel">
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="primary" id="submitBtn">Check In</button>
          <button type="button" class="secondary" id="backBtn">Back to Waiver</button>
        </div>

        <div id="message" class="message"></div>
      </form>
    </div>

    <div id="lockedScreen" class="locked-screen">
      <h2>Waiver Required</h2>
      <p>You must complete the waiver before signing in.</p>
      <button id="goToWaiver" class="primary">Go to Waiver</button>
    </div>

    <div id="successScreen" class="success-screen">
      <h2>You're checked in</h2>
      <p>Have a great run.</p>
      <button id="nextBtn" class="primary">Check In Another Participant</button>
    </div>
  </div>

  <div class="footer-note">UORC participant sign-in | v1.0</div>
</div>

<script>
  const form = document.getElementById('form');
  const formContainer = document.getElementById('formContainer');
  const successScreen = document.getElementById('successScreen');
  const lockedScreen = document.getElementById('lockedScreen');
  const waiverStatus = document.getElementById('waiverStatus');
  const message = document.getElementById('message');

  const firstNameInput = document.getElementById('firstName');
  const lastNameInput = document.getElementById('lastName');
  const emailInput = document.getElementById('email');
  const phoneInput = document.getElementById('phone');
  const emergencyNameInput = document.getElementById('emergencyName');
  const emergencyPhoneInput = document.getElementById('emergencyPhone');
  const submitBtn = document.getElementById('submitBtn');

  const APPS_SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

  function getWaiverData() {
    try {
      return JSON.parse(sessionStorage.getItem('uorcWaiverData'));
    } catch {
      return null;
    }
  }

  function showMessage(text, type) {
    message.textContent = text;
    message.className = 'message ' + type;
  }

  function clearMessage() {
    message.textContent = '';
    message.className = 'message';
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function validateAccess() {
    const data = getWaiverData();

    if (!data || data.waiverAccepted !== 'Yes' || !data.signature || !data.waiverFlowToken) {
      formContainer.classList.add('hidden');
      lockedScreen.classList.add('show');
      return null;
    }

    waiverStatus.innerHTML = `Waiver signed by <strong>${escapeHtml(data.signature)}</strong>`;

    if (data.firstName) {
      firstNameInput.value = data.firstName;
    }

    if (data.lastName) {
      lastNameInput.value = data.lastName;
    }

    return data;
  }

  function validateForm() {
    if (!firstNameInput.value.trim()) {
      showMessage('Please enter your first name.', 'error');
      firstNameInput.focus();
      return false;
    }

    if (!lastNameInput.value.trim()) {
      showMessage('Please enter your last name.', 'error');
      lastNameInput.focus();
      return false;
    }

    const email = emailInput.value.trim();
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showMessage('Please enter a valid email address.', 'error');
      emailInput.focus();
      return false;
    }

    if (!emergencyNameInput.value.trim()) {
      showMessage('Please enter an emergency contact name.', 'error');
      emergencyNameInput.focus();
      return false;
    }

    if (!emergencyPhoneInput.value.trim()) {
      showMessage('Please enter an emergency contact phone number.', 'error');
      emergencyPhoneInput.focus();
      return false;
    }

    return true;
  }

  document.getElementById('goToWaiver').onclick = () => {
    window.location.href = 'waiver.html';
  };

  document.getElementById('backBtn').onclick = () => {
    window.location.href = 'waiver.html';
  };

  document.getElementById('nextBtn').onclick = () => {
    sessionStorage.removeItem('uorcWaiverData');
    form.reset();
    successScreen.classList.remove('show');
    window.location.href = 'waiver.html';
  };

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMessage();

    const waiver = getWaiverData();
    if (!waiver) {
      showMessage('Waiver information is missing. Please complete the waiver again.', 'error');
      return;
    }

    if (!validateForm()) {
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    const payload = new URLSearchParams();
    payload.append('firstName', firstNameInput.value.trim());
    payload.append('lastName', lastNameInput.value.trim());
    payload.append('email', emailInput.value.trim());
    payload.append('phone', phoneInput.value.trim());
    payload.append('emergencyName', emergencyNameInput.value.trim());
    payload.append('emergencyPhone', emergencyPhoneInput.value.trim());
    payload.append('waiverAcceptance', waiver.waiverAccepted);
    payload.append('signature', waiver.signature);
    payload.append('waiverSignedAt', waiver.signedAt || '');

    try {
      if (APPS_SCRIPT_URL.includes('PASTE')) {
        console.log('TEST MODE:', Object.fromEntries(payload.entries()));
      } else {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: payload
        });

        const text = await response.text();

        if (!response.ok || text.toUpperCase().includes('ERROR')) {
          throw new Error(text || 'Submission failed.');
        }
      }

      formContainer.classList.add('hidden');
      successScreen.classList.add('show');
    } catch (err) {
      showMessage('Submission failed. Try again.', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Check In';
    }
  });

  validateAccess();
</script>
</body>
</html>
