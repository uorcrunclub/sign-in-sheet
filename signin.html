<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UORC Sign-In</title>

  <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="167x167" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="152x152" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="apple-touch-icon" sizes="120x120" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/uorcrunclub/sign-in-sheet/main/uorc_app_icon_black.png">

  <meta name="apple-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="UORC Sign-In">

  <link rel="stylesheet" href="/sign-in-sheet/styles.css">
  
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div class="eyebrow">UORC Check-In</div>
      <h1>Participant Sign-In</h1>
      <div class="subtext">Complete the fields below to finish check-in.</div>
    </div>

    <div class="content" id="formContainer">
      <div class="waiver-status" id="waiverStatus">Checking waiver status...</div>

      <form id="form" method="POST" target="submitFrame" action="https://script.google.com/macros/s/AKfycbzoSr6z6FLDflWNBxVFStb65qJzc2EspLHPYj0ZG8LmKxZBR1V7MEu96vgxtwdc2NOfzg/exec" novalidate>
        
        <div class="field-row">
          <div class="field-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" required autocomplete="given-name">
          </div>

          <div class="field-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" required autocomplete="family-name">
          </div>
        </div>

        <div class="field-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" autocomplete="email" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$">
          <div class="helper">Optional.</div>
        </div>

        <div class="field-group">
          <label for="phone">Phone Number</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel">
          <div class="helper">Optional.</div>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="emergencyName">Emergency Contact Name</label>
            <input type="text" id="emergencyName" name="emergencyName">
            <div class="helper">Optional.</div>
          </div>

          <div class="field-group">
            <label for="emergencyPhone">Emergency Contact Phone</label>
            <input id="emergencyPhone" name="emergencyPhone" type="tel" autocomplete="tel">
            <div class="helper">Optional.</div>
          </div>
        </div>
        
        <iframe name="submitFrame" id="submitFrame" style="display:none;"></iframe>

        <div class="actions">
          <button type="submit" class="primary" id="submitBtn">Check In</button>
          <button type="button" class="secondary" id="backBtn">Back to Waiver</button>
        </div>

        <div id="message" class="message"></div>
        
        <input type="hidden" id="waiverAcceptance" name="waiverAcceptance">
        <input type="hidden" id="signature" name="signature">
        <input type="hidden" id="waiverSignedAt" name="waiverSignedAt">
        
      </form>
    </div>

    <div id="lockedScreen" class="locked-screen">
      <h2>Waiver Required</h2>
      <p>You must complete the waiver before signing in.</p>
      <button id="goToWaiver" class="primary">Go to Waiver</button>
    </div>

    <div id="successScreen" class="success-screen">
      <div class="success-content">
        <svg class="checkin-icon" viewBox="0 0 1024 1024" aria-hidden="true">
          <path d="M 519.0 144.0 L 527.0 154.0 L 534.0 172.0 L 533.0 193.0 L 524.0 211.0 L 510.0 224.0 L 491.0 231.0 L 425.0 232.0 L 420.0 236.0 L 354.0 366.0 L 343.0 394.0 L 341.0 419.0 L 345.0 437.0 L 353.0 452.0 L 362.0 462.0 L 490.0 546.0 L 501.0 557.0 L 444.0 725.0 L 445.0 742.0 L 453.0 757.0 L 466.0 768.0 L 482.0 773.0 L 492.0 773.0 L 508.0 768.0 L 526.0 750.0 L 607.0 532.0 L 606.0 520.0 L 600.0 510.0 L 489.0 411.0 L 484.0 403.0 L 519.0 332.0 L 567.0 246.0 L 575.0 223.0 L 572.0 197.0 L 563.0 178.0 L 540.0 154.0 Z"/><path d="M 400.0 509.0 L 352.0 475.0 L 339.0 462.0 L 330.0 444.0 L 252.0 551.0 L 248.0 553.0 L 104.0 553.0 L 87.0 561.0 L 78.0 571.0 L 73.0 582.0 L 73.0 602.0 L 78.0 614.0 L 87.0 624.0 L 97.0 630.0 L 108.0 633.0 L 286.0 633.0 L 294.0 631.0 L 309.0 623.0 L 318.0 614.0 Z"/><path d="M 512.0 157.0 L 501.0 146.0 L 491.0 141.0 L 480.0 139.0 L 318.0 139.0 L 303.0 144.0 L 292.0 153.0 L 285.0 164.0 L 236.0 291.0 L 233.0 311.0 L 238.0 328.0 L 246.0 338.0 L 263.0 347.0 L 279.0 348.0 L 294.0 343.0 L 306.0 333.0 L 312.0 323.0 L 349.0 225.0 L 356.0 216.0 L 489.0 215.0 L 495.0 213.0 L 507.0 205.0 L 517.0 187.0 L 517.0 169.0 Z"/><path d="M 543.0 319.0 L 591.0 375.0 L 601.0 380.0 L 616.0 381.0 L 628.0 377.0 L 731.0 324.0 L 743.0 309.0 L 746.0 288.0 L 740.0 273.0 L 732.0 264.0 L 719.0 257.0 L 700.0 256.0 L 632.0 289.0 L 623.0 289.0 L 612.0 278.0 L 586.0 243.0 Z"/><path d="M 578.0 10.0 L 555.0 17.0 L 532.0 36.0 L 519.0 62.0 L 517.0 86.0 L 520.0 101.0 L 527.0 117.0 L 544.0 136.0 L 568.0 148.0 L 597.0 150.0 L 613.0 146.0 L 627.0 139.0 L 644.0 123.0 L 656.0 99.0 L 658.0 71.0 L 649.0 45.0 L 633.0 26.0 L 610.0 13.0 L 598.0 10.0 Z"/><path d="M 39.0 447.0 L 42.0 457.0 L 48.0 460.0 L 265.0 460.0 L 274.0 453.0 L 273.0 443.0 L 266.0 438.0 L 48.0 438.0 L 42.0 441.0 Z"/><path d="M 10.0 325.0 L 12.0 335.0 L 21.0 339.0 L 195.0 338.0 L 201.0 331.0 L 201.0 323.0 L 194.0 317.0 L 18.0 317.0 Z"/><path d="M 62.0 214.0 L 64.0 225.0 L 72.0 229.0 L 215.0 229.0 L 222.0 226.0 L 225.0 221.0 L 225.0 214.0 L 219.0 207.0 L 69.0 207.0 Z"/><path d="M 158.0 386.0 L 159.0 397.0 L 168.0 402.0 L 299.0 402.0 L 306.0 399.0 L 309.0 394.0 L 307.0 384.0 L 301.0 380.0 L 165.0 380.0 Z"/><path d="M 138.0 163.0 L 140.0 169.0 L 148.0 174.0 L 238.0 174.0 L 246.0 169.0 L 248.0 160.0 L 240.0 152.0 L 147.0 152.0 L 141.0 155.0 Z"/><path d="M 100.0 272.0 L 101.0 279.0 L 110.0 285.0 L 193.0 285.0 L 200.0 280.0 L 202.0 274.0 L 200.0 268.0 L 191.0 263.0 L 109.0 263.0 L 102.0 267.0 Z"/><path d="M 152.0 501.0 L 153.0 508.0 L 162.0 514.0 L 240.0 514.0 L 246.0 511.0 L 249.0 506.0 L 247.0 496.0 L 239.0 492.0 L 161.0 492.0 L 156.0 494.0 Z"/>
        </svg>
        <div class="success-text">
          <h2>You're checked in</h2>
          <p>Have a great run.</p>
          <button id="nextBtn" class="primary success-next-btn">
            Check In Another Participant
          </button>
        </div>
      </div>
    </div>
  
  </div>

  <div class="footer-note">UORC participant sign-in | v1.0</div>
</div>

<script>
  console.log('UORC SIGNIN SCRIPT LOADED');

  const form = document.getElementById('form');
  const formContainer = document.getElementById('formContainer');
  const successScreen = document.getElementById('successScreen');
  const lockedScreen = document.getElementById('lockedScreen');
  const waiverStatus = document.getElementById('waiverStatus');
  const message = document.getElementById('message');

  const firstNameInput = document.getElementById('firstName');
  const lastNameInput = document.getElementById('lastName');
  const emailInput = document.getElementById('email');
  const phoneInput = document.getElementById('phone');
  const emergencyNameInput = document.getElementById('emergencyName');
  const emergencyPhoneInput = document.getElementById('emergencyPhone');
  const submitBtn = document.getElementById('submitBtn');

  const waiverAcceptanceInput = document.getElementById('waiverAcceptance');
  const signatureInput = document.getElementById('signature');
  const waiverSignedAtInput = document.getElementById('waiverSignedAt');

  let submissionInProgress = false;
  let submissionTimeout = null;

  function getWaiverData() {
    try {
      return JSON.parse(sessionStorage.getItem('uorcWaiverData'));
    } catch (err) {
      console.error('Failed to parse waiver data:', err);
      return null;
    }
  }

  function showMessage(text, type) {
    message.textContent = text;
    message.className = 'message ' + type;
  }

  function clearMessage() {
    message.textContent = '';
    message.className = 'message';
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function digitsOnly(value) {
    return String(value || '').replace(/\D/g, '');
  }

  function formatPhoneInput(value) {
    const digits = digitsOnly(value).slice(0, 10);

    if (digits.length === 0) return '';
    if (digits.length < 4) return `(${digits}`;
    if (digits.length < 7) return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
    return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
  }

  function attachPhoneFormatter(input) {
    input.addEventListener('input', (e) => {
      e.target.value = formatPhoneInput(e.target.value);
    });

    input.addEventListener('blur', (e) => {
      e.target.value = formatPhoneInput(e.target.value);
    });
  }

  function validateAccess() {
    const data = getWaiverData();
    console.log('validateAccess waiver data:', data);

    if (!data || data.waiverAccepted !== 'Yes' || !data.signature || !data.waiverFlowToken) {
      console.warn('Waiver data missing or invalid. Locking sign-in page.');
      formContainer.classList.add('hidden');
      lockedScreen.classList.add('show');
      return null;
    }

    waiverStatus.innerHTML = `Waiver signed by <strong>${escapeHtml(data.signature)}</strong>`;

    if (data.firstName) {
      firstNameInput.value = data.firstName;
    }

    if (data.lastName) {
      lastNameInput.value = data.lastName;
    }

    return data;
  }

  function validateForm() {
    const firstName = firstNameInput.value.trim();
    const lastName = lastNameInput.value.trim();
    const email = emailInput.value.trim();
    const phone = phoneInput.value.trim();
    const emergencyName = emergencyNameInput.value.trim();
    const emergencyPhone = emergencyPhoneInput.value.trim();

    if (!firstName) {
      showMessage('Please enter your first name.', 'error');
      firstNameInput.focus();
      return false;
    }

    if (!lastName) {
      showMessage('Please enter your last name.', 'error');
      lastNameInput.focus();
      return false;
    }

    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showMessage('Please enter a valid email address.', 'error');
      emailInput.focus();
      return false;
    }

    if (phone) {
      const phoneDigits = digitsOnly(phone);
      if (phoneDigits.length !== 10) {
        showMessage('Please enter a valid 10-digit phone number.', 'error');
        phoneInput.focus();
        return false;
      }
      phoneInput.value = formatPhoneInput(phone);
    }
    
    const emergencyPhoneDigits = digitsOnly(emergencyPhone);
    // Only validate format IF user entered something
    if (emergencyPhoneInput.value.trim()) {
      if (!isValidPhone(emergencyPhoneInput.value)) {
        showMessage('Enter a valid emergency phone number', 'error');
        return false;
      }
    }

    emergencyPhoneInput.value = formatPhoneInput(emergencyPhone);
    return true;
  }

  function resetSubmitState() {
    submissionInProgress = false;
    submitBtn.disabled = false;
    submitBtn.textContent = 'Check In';

    if (submissionTimeout) {
      clearTimeout(submissionTimeout);
      submissionTimeout = null;
    }
  }

  document.getElementById('goToWaiver').onclick = () => {
    window.location.href = 'waiver.html';
  };

  document.getElementById('backBtn').onclick = () => {
    window.location.href = 'waiver.html';
  };

  document.getElementById('nextBtn').onclick = () => {
    sessionStorage.removeItem('uorcWaiverData');
    form.reset();
    successScreen.classList.remove('show');
    window.location.href = 'waiver.html';
  };

  window.addEventListener('message', (event) => {
    console.log('MESSAGE RECEIVED:', event.origin, event.data);

    const origin = event.origin || '';

    const isGoogleAppsScriptOrigin =
      origin === 'https://script.google.com' ||
      origin.endsWith('.googleusercontent.com') ||
      origin.includes('script.googleusercontent.com');

    if (!isGoogleAppsScriptOrigin) {
      console.warn('Ignoring message from unexpected origin:', origin);
      return;
    }

    const data = event.data;
    if (!data || typeof data !== 'object') {
      console.warn('Ignoring non-object message payload:', data);
      return;
    }

if (data.success === true) {
  console.log('Submission success received from Apps Script.');
  resetSubmitState();

  formContainer.classList.add('hidden');

  // Ensure it's visible first (if you're using display somewhere)
  successScreen.style.display = 'block';

  // Reset animation so it always plays
  successScreen.classList.remove('show');
  void successScreen.offsetWidth;

  // Trigger animation
  successScreen.classList.add('show');

  return;
}

    if (data.success === false) {
      console.error('Submission failure received from Apps Script:', data.message);
      resetSubmitState();
      showMessage(data.message || 'Submission failed.', 'error');
      return;
    }

    console.warn('Message received but did not match expected payload shape:', data);
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    clearMessage();

    const waiver = getWaiverData();
    console.log('Submitting form with waiver data:', waiver);

    if (!waiver) {
      showMessage('Waiver information is missing. Please complete the waiver again.', 'error');
      return;
    }

    if (!validateForm()) {
      return;
    }

    if (submissionInProgress) {
      console.warn('Submission already in progress. Ignoring duplicate click.');
      return;
    }

    submissionInProgress = true;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    phoneInput.value = digitsOnly(phoneInput.value.trim());
    emergencyPhoneInput.value = digitsOnly(emergencyPhoneInput.value.trim());
    waiverAcceptanceInput.value = waiver.waiverAccepted;
    signatureInput.value = waiver.signature;
    waiverSignedAtInput.value = waiver.signedAt || '';

    console.log('Form payload prepared. Submitting to iframe target.');

    submissionTimeout = setTimeout(() => {
      if (submissionInProgress) {
        console.error('Submission timed out waiting for iframe response.');
        resetSubmitState();
        showMessage('Submission timed out. Check the sheet, then try again.', 'error');
      }
    }, 10000);

    form.submit();
  });

  attachPhoneFormatter(phoneInput);
  attachPhoneFormatter(emergencyPhoneInput);

  validateAccess();
</script>
  
</body>
</html>
